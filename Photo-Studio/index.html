<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patel Photography</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <div class="main_box">
      <input type="checkbox" id="check" />

      <!-- Dark overlay when sidebar open -->
      <div class="overlay">
        <label for="check" style="display:block;width:100%;height:100%;cursor:pointer;"></label>
      </div>

      <!-- Hamburger -->
      <div class="btn_one">
        <label for="check">
          <i class="fa-solid fa-bars"></i>
        </label>
      </div>

      <!-- Sidebar -->
      <div class="sidebar_menu">

        <!-- Logo with camera icon -->
        <div class="logo">
          <a href="#">Patel PhotoGraphy</a>
        </div>

        <!-- Close button -->
        <div class="btn_two">
          <label for="check">
            <i class="fa-solid fa-xmark"></i>
          </label>
        </div>

        <!-- Nav menu -->
        <div class="menu">
          <ul>
            <li class="active">
              <a href="#"><i class="fa-solid fa-image"></i>Gallery</a>
            </li>
            <li>
              <a href="#"><i class="fa-solid fa-arrow-up-right-from-square"></i>Shortcuts</a>
            </li>
            <li>
              <a href="#"><i class="fa-solid fa-photo-film"></i>Exhibits</a>
            </li>
            <li>
              <a href="#"><i class="fa-solid fa-calendar-days"></i>Events</a>
            </li>
            <li>
              <a href="#"><i class="fa-solid fa-store"></i>Store</a>
            </li>
            <li>
              <a href="#"><i class="fa-solid fa-phone"></i>Contact</a>
            </li>
            <li>
              <a href="#"><i class="fa-regular fa-comments"></i>Feedback</a>
            </li>
          </ul>
        </div>

        <!-- Social media -->
        <div class="social_media">
          <p>Follow Us</p>
          <ul>
            <li><a href="#"><i class="fa-brands fa-facebook"></i></a></li>
            <li><a href="#"><i class="fa-brands fa-twitter"></i></a></li>
            <li><a href="#"><i class="fa-brands fa-instagram"></i></a></li>
            <li><a href="#"><i class="fa-brands fa-youtube"></i></a></li>
          </ul>
        </div>

      </div>
    </div>

  </body>
</html>
